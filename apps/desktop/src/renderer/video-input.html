<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>播放B站视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            overflow: hidden;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            user-select: none;
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid rgba(124, 92, 252, 0.18);
            box-shadow:
                0 18px 60px rgba(30, 22, 65, 0.22),
                0 6px 18px rgba(124, 92, 252, 0.16);
            backdrop-filter: blur(16px);
            -webkit-app-region: drag;
        }

        .card input {
            flex: 1;
            min-width: 0;
            height: 46px;
            padding: 0 16px;
            border: 1px solid rgba(124, 92, 252, 0.18);
            border-radius: 14px;
            font-size: 15px;
            color: #2b2545;
            background: #fff;
            outline: none;
            -webkit-app-region: no-drag;
        }

        .card input:focus {
            border-color: #7c5cfc;
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.12);
        }

        .send-btn {
            flex-shrink: 0;
            height: 46px;
            padding: 0 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #7c5cfc, #5f8bff);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .close-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 28px;
            height: 28px;
            border: 2px solid #fff;
            border-radius: 50%;
            background: #7c5cfc;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(124, 92, 252, 0.28);
            line-height: 1;
            -webkit-app-region: no-drag;
        }

        .close-btn:hover {
            background: #ef5350;
        }
    </style>
</head>

<body>
    <div class="card">
        <input type="text" id="input" placeholder="粘贴B站视频链接 bilibili.com/video/BVxxx" autofocus />
        <button class="send-btn" id="send-btn">播放</button>
        <button class="close-btn" id="close-btn">✕</button>
    </div>
    <script src="./video-input.js" type="module"></script>
</body>

</html>
