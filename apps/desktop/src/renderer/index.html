<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: pet-asset:; media-src pet-asset:; frame-src https://player.bilibili.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>玄神 - AI桌面宠物</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div id="app">
    <!-- Pet Container -->
    <div id="pet-container" draggable="false">
      <div id="pet-sprite" draggable="false"></div>
      <div id="resize-handle" class="resize-handle"></div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="panel">
      <div class="panel-header">
        <span>💬 聊天</span>
        <button class="close-btn" data-close="chat-panel">✕</button>
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="和宠物说点什么..." />
        <button id="chat-send-btn">发送</button>
      </div>
    </div>

    <!-- Interact Panel -->
    <div id="interact-panel" class="panel">
      <div class="panel-header">
        <span>🎮 互动</span>
        <button class="close-btn" data-close="interact-panel">✕</button>
      </div>
      <div class="interact-actions">
        <button class="interact-btn" data-interact="pet">🤚 摸摸头</button>
        <button class="interact-btn" data-interact="feed">🍖 喂食</button>
        <button class="interact-btn" data-interact="play">⚽ 玩耍</button>
        <button class="interact-btn" data-interact="sleep">😴 睡觉</button>
      </div>
      <div id="interact-response" class="interact-response"></div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="panel">
      <div class="panel-header">
        <span>⚙️ 设置</span>
        <button class="close-btn" data-close="settings-panel">✕</button>
      </div>
      <div class="settings-content">
        <div class="setting-group">
          <label>宠物风格</label>
          <textarea id="system-prompt-input" rows="3" placeholder="设置宠物的说话风格和性格..."></textarea>
        </div>
        <div class="setting-group">
          <label>AI 供应商</label>
          <select id="provider-select"></select>
        </div>
        <div class="setting-group">
          <label>API Key</label>
          <input type="password" id="api-key-input" placeholder="输入 API Key" />
        </div>
        <div class="setting-group">
          <label>模型</label>
          <input type="text" id="model-input" placeholder="模型名称" />
        </div>
        <button id="save-settings-btn" class="save-btn">保存设置</button>
      </div>
    </div>

    <!-- Animations Panel -->
    <div id="animations-panel" class="panel">
      <div class="panel-header">
        <span>🎭 动作设置</span>
        <button class="close-btn" data-close="animations-panel">✕</button>
      </div>
      <div class="animations-content" id="animations-content">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- Playlist Panel -->
    <div id="playlist-panel" class="panel">
      <div class="panel-header">
        <span>🎵 歌单设置</span>
        <button class="close-btn" data-close="playlist-panel">✕</button>
      </div>
      <div class="playlist-content" id="playlist-content">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- Song Picker Panel (for choosing a specific song to play) -->
    <div id="song-picker-panel" class="panel">
      <div class="panel-header">
        <span>🎤 选择歌曲</span>
        <button class="close-btn" data-close="song-picker-panel">✕</button>
      </div>
      <div class="playlist-content" id="song-picker-content">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- Skills Panel -->
    <div id="skills-panel" class="panel">
      <div class="panel-header">
        <span>📚 技能</span>
        <button class="close-btn" data-close="skills-panel">✕</button>
      </div>
      <div class="skills-content" id="skills-content"></div>
    </div>

    <!-- Scheduled Tasks Panel -->
    <div id="scheduled-panel" class="panel">
      <div class="panel-header">
        <span>⏰ 定时说话</span>
        <button class="close-btn" data-close="scheduled-panel">✕</button>
      </div>
      <div class="scheduled-content" id="scheduled-content"></div>
    </div>

    <div id="quick-chat-settings-panel" class="panel">
      <div class="panel-header">
        <span>⚡ 快速聊天设置</span>
        <button class="close-btn" data-close="quick-chat-settings-panel">✕</button>
      </div>
      <div class="settings-content">
        <div class="setting-group">
          <label>输入框占位文案</label>
          <input type="text" id="quick-chat-placeholder-input" placeholder="你想问龙哥什么" />
        </div>
        <button id="save-quick-chat-settings-btn" class="save-btn">保存设置</button>
      </div>
    </div>

    <div id="shortcut-settings-panel" class="panel">
      <div class="panel-header">
        <span>⌨️ 快捷键配置</span>
        <button class="close-btn" data-close="shortcut-settings-panel">✕</button>
      </div>
      <div class="settings-content">
        <div class="shortcut-tip">使用 Electron Accelerator 格式，例如 `Control+Shift+X`。</div>
        <div id="shortcut-settings-content" class="shortcut-settings-content"></div>
        <button id="save-shortcut-settings-btn" class="save-btn">保存快捷键</button>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
